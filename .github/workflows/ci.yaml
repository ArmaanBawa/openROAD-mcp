# =============================================================================
# ci.yaml — Updated CI workflow with Docker test integration and memory profiling
#
# This is the enhanced version of the existing ci.yaml that adds:
#   - Docker-based integration test job
#   - Memory profiling in nightly runs
#   - Benchmark regression tracking
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'

env:
  MCP_SERVER_REQUEST_TIMEOUT: 120
  MCP_REQUEST_MAX_TOTAL_TIMEOUT: 300

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        test-type: [lint, core, interactive, integration, tools]

    steps:
    - uses: actions/checkout@v4
    - uses: astral-sh/setup-uv@v6
    - run: make sync

    - name: Run lint
      if: matrix.test-type == 'lint'
      run: make check

    - name: Run core tests
      if: matrix.test-type == 'core'
      run: make test

    - name: Run interactive tests
      if: matrix.test-type == 'interactive'
      run: make test-interactive

    - name: Run integration tests
      if: matrix.test-type == 'integration'
      run: make test-integration

    - name: Run tools tests
      if: matrix.test-type == 'tools'
      run: make test-tools

  # ---------------------------------------------------------------------------
  # Docker-based integration tests (validates full ORFS flows)
  # ---------------------------------------------------------------------------
  docker-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'schedule' || github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker test image
      run: make docker-test-build

    - name: Run integration tests in Docker
      run: make test-integration

    - name: Run interactive tests in Docker
      run: make test-interactive

  # ---------------------------------------------------------------------------
  # Nightly: Performance benchmarks + memory profiling
  # ---------------------------------------------------------------------------
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'schedule' || github.event_name == 'pull_request'

    steps:
    - uses: actions/checkout@v4
    - uses: astral-sh/setup-uv@v6
    - run: make sync

    - name: Run performance tests (benchmarks + memory profiling)
      run: make test-performance
      env:
        MEMORY_PROFILE: "1"

    - name: Check benchmark regressions
      run: python scripts/benchmark_track.py --threshold 0.20
      continue-on-error: true

    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: benchmark-results-${{ github.sha }}
        path: tests/performance/results/
        retention-days: 90

  # ---------------------------------------------------------------------------
  # Coverage
  # ---------------------------------------------------------------------------
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test
    steps:
    - uses: actions/checkout@v4
    - uses: astral-sh/setup-uv@v6
    - run: make sync
    - run: make test-coverage
    - uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        token: ${{ secrets.CODECOV_TOKEN }}
    - name: Upload test results to Codecov
      if: ${{ !cancelled() }}
      uses: codecov/test-results-action@v1
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
